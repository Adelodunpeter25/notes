<style>
  :root {
    --bg: #ffffff;
    --surface: #f2f2f7;
    --border: #e0e0e5;
    --text: #1c1c1e;
    --text-secondary: #8e8e93;
    --accent: #007aff;
    --accent-light: #e8f1ff;
    --toolbar-bg: #f9f9fb;
    --toolbar-border: #d1d1d6;
    --btn-active: #007aff;
    --btn-active-text: #ffffff;
    --btn-hover: #e8e8ed;
    --task-checked: #34c759;
    --monospace: 'Menlo', 'Courier New', monospace;
    --serif: Georgia, serif;
    --radius: 8px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #000000;
      --surface: #1c1c1e;
      --border: #38383a;
      --text: #f2f2f7;
      --text-secondary: #636366;
      --accent: #0a84ff;
      --accent-light: #0a2040;
      --toolbar-bg: #1c1c1e;
      --toolbar-border: #38383a;
      --btn-hover: #2c2c2e;
      --task-checked: #32d74b;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'SF Pro Text', sans-serif;
    font-size: 17px;
    -webkit-font-smoothing: antialiased;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100%;
    height: 100dvh;
  }

  /* ── Toolbar ── */
  #toolbar-scroll {
    overflow-x: auto;
    overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    background: var(--toolbar-bg);
    border-bottom: 1px solid var(--toolbar-border);
    flex-shrink: 0;
  }
  #toolbar-scroll::-webkit-scrollbar { display: none; }

  #toolbar {
    display: flex;
    align-items: center;
    gap: 2px;
    padding: 6px 10px;
    white-space: nowrap;
    min-width: max-content;
  }

  .tb-divider {
    width: 1px;
    height: 22px;
    background: var(--toolbar-border);
    margin: 0 4px;
    flex-shrink: 0;
  }

  .tb-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 36px;
    height: 36px;
    padding: 0 8px;
    border: none;
    border-radius: 7px;
    background: transparent;
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.12s, color 0.12s;
    -webkit-user-select: none;
    user-select: none;
    white-space: nowrap;
  }
  .tb-btn:active { opacity: 0.6; }
  .tb-btn.is-active {
    background: var(--btn-active);
    color: var(--btn-active-text);
  }
  .tb-btn svg {
    width: 18px;
    height: 18px;
    fill: currentColor;
    flex-shrink: 0;
  }

  /* Style label buttons */
  .tb-style-label {
    font-size: 13px;
    font-weight: 500;
    padding: 0 10px;
    min-width: auto;
  }

  /* ── Editor area ── */
  #editor-wrap {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 16px 18px calc(16px + var(--safe-bottom)) 18px;
  }

  .ProseMirror {
    outline: none;
    min-height: 100%;
    word-break: break-word;
    line-height: 1.55;
    color: var(--text);
  }

  /* Placeholder */
  .ProseMirror p.is-editor-empty:first-child::before {
    content: attr(data-placeholder);
    color: var(--text-secondary);
    pointer-events: none;
    float: left;
    height: 0;
  }

  /* ── Typography styles matching Apple Notes ── */
  .ProseMirror h1 {
    font-size: 26px;
    font-weight: 700;
    line-height: 1.25;
    margin-bottom: 4px;
    letter-spacing: -0.3px;
  }
  .ProseMirror h2 {
    font-size: 20px;
    font-weight: 600;
    line-height: 1.3;
    margin-top: 12px;
    margin-bottom: 2px;
  }
  .ProseMirror h3 {
    font-size: 17px;
    font-weight: 600;
    line-height: 1.4;
    margin-top: 8px;
    margin-bottom: 2px;
  }
  .ProseMirror p { margin-bottom: 2px; }

  /* Monospaced body style via a custom class */
  .ProseMirror p.mono,
  .ProseMirror li.mono {
    font-family: var(--monospace);
    font-size: 15px;
  }

  /* Lists */
  .ProseMirror ul,
  .ProseMirror ol {
    padding-left: 24px;
    margin: 2px 0;
  }
  .ProseMirror li { margin: 1px 0; }
  .ProseMirror li p { margin: 0; }

  /* Task list */
  .ProseMirror ul[data-type="taskList"] {
    list-style: none;
    padding-left: 4px;
  }
  .ProseMirror ul[data-type="taskList"] li {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin: 3px 0;
  }
  .ProseMirror ul[data-type="taskList"] li > label {
    flex-shrink: 0;
    margin-top: 2px;
  }
  .ProseMirror ul[data-type="taskList"] li > label input[type="checkbox"] {
    appearance: none;
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border: 2px solid var(--text-secondary);
    border-radius: 50%;
    cursor: pointer;
    position: relative;
    transition: background 0.15s, border-color 0.15s;
  }
  .ProseMirror ul[data-type="taskList"] li > label input[type="checkbox"]:checked {
    background: var(--task-checked);
    border-color: var(--task-checked);
  }
  .ProseMirror ul[data-type="taskList"] li > label input[type="checkbox"]:checked::after {
    content: '';
    position: absolute;
    left: 4px; top: 1px;
    width: 6px; height: 10px;
    border: 2px solid white;
    border-top: none; border-left: none;
    transform: rotate(45deg);
  }
  .ProseMirror ul[data-type="taskList"] li[data-checked="true"] > div {
    text-decoration: line-through;
    color: var(--text-secondary);
  }
  .ProseMirror ul[data-type="taskList"] li > div { flex: 1; }

  /* Blockquote */
  .ProseMirror blockquote {
    border-left: 3px solid var(--accent);
    padding-left: 12px;
    color: var(--text-secondary);
    margin: 6px 0;
    font-style: italic;
  }

  /* Code inline */
  .ProseMirror code {
    font-family: var(--monospace);
    font-size: 14px;
    background: var(--surface);
    padding: 1px 5px;
    border-radius: 4px;
    color: var(--text);
  }

  /* Code block */
  .ProseMirror pre {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 12px 14px;
    overflow-x: auto;
    margin: 8px 0;
    font-family: var(--monospace);
    font-size: 14px;
    line-height: 1.5;
  }
  .ProseMirror pre code {
    background: none;
    padding: 0;
    font-size: inherit;
  }

  /* Horizontal rule */
  .ProseMirror hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 14px 0;
  }

  /* Link */
  .ProseMirror a {
    color: var(--accent);
    text-decoration: underline;
  }

  /* Text align */
  .ProseMirror [style*="text-align: center"] { text-align: center; }
  .ProseMirror [style*="text-align: right"] { text-align: right; }
  .ProseMirror [style*="text-align: justify"] { text-align: justify; }

  /* Indent via margin */
  .ProseMirror [data-indent="1"] { margin-left: 24px; }
  .ProseMirror [data-indent="2"] { margin-left: 48px; }
  .ProseMirror [data-indent="3"] { margin-left: 72px; }
  .ProseMirror [data-indent="4"] { margin-left: 96px; }
  .ProseMirror [data-indent="5"] { margin-left: 120px; }
  .ProseMirror [data-indent="6"] { margin-left: 144px; }

  /* Selection */
  .ProseMirror ::selection {
    background: var(--accent-light);
  }

  /* Popover for heading styles */
  #style-popover {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 100;
    display: none;
    align-items: flex-end;
  }
  #style-popover.open { display: flex; }
  #style-popover-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.25);
  }
  #style-popover-sheet {
    position: relative;
    z-index: 1;
    width: 100%;
    background: var(--toolbar-bg);
    border-radius: 16px 16px 0 0;
    padding: 12px 16px calc(20px + var(--safe-bottom));
    border-top: 1px solid var(--toolbar-border);
  }
  #style-popover-sheet h4 {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }
  .style-option {
    display: flex;
    align-items: center;
    padding: 10px 12px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.1s;
    -webkit-user-select: none;
    user-select: none;
    border: none;
    background: transparent;
    width: 100%;
    text-align: left;
    color: var(--text);
  }
  .style-option:active { background: var(--btn-hover); }
  .style-option.active { background: var(--accent-light); color: var(--accent); }
  .style-option .preview { flex: 1; }
  .style-option .check { color: var(--accent); font-size: 18px; }
  .so-title { font-size: 24px; font-weight: 700; }
  .so-heading { font-size: 19px; font-weight: 600; }
  .so-subheading { font-size: 15px; font-weight: 600; }
  .so-body { font-size: 17px; }
  .so-mono { font-size: 15px; font-family: var(--monospace); }
</style>
</head>

<div id="app">

<script type="module">
import { Editor } from '@tiptap/core';
import Document from '@tiptap/extension-document';
import Paragraph from '@tiptap/extension-paragraph';
import Text from '@tiptap/extension-text';
import Bold from '@tiptap/extension-bold';
import Italic from '@tiptap/extension-italic';
import Underline from '@tiptap/extension-underline';
import Strike from '@tiptap/extension-strike';
import Code from '@tiptap/extension-code';
import CodeBlock from '@tiptap/extension-code-block';
import Heading from '@tiptap/extension-heading';
import BulletList from '@tiptap/extension-bullet-list';
import OrderedList from '@tiptap/extension-ordered-list';
import ListItem from '@tiptap/extension-list-item';
import TaskList from '@tiptap/extension-task-list';
import TaskItem from '@tiptap/extension-task-item';
import TextAlign from '@tiptap/extension-text-align';
import History from '@tiptap/extension-history';
import Placeholder from '@tiptap/extension-placeholder';
import HorizontalRule from '@tiptap/extension-horizontal-rule';
import Blockquote from '@tiptap/extension-blockquote';
import Link from '@tiptap/extension-link';
import { Extension } from '@tiptap/core';

// ── Custom Indent Extension ──
const Indent = Extension.create({
  name: 'indent',
  addOptions() {
    return { minIndent: 0, maxIndent: 6 };
  },
  addGlobalAttributes() {
    return [{
      types: ['paragraph', 'heading', 'listItem', 'taskItem'],
      attributes: {
        indent: {
          default: 0,
          renderHTML: attrs => attrs.indent > 0 ? { 'data-indent': attrs.indent } : {},
          parseHTML: el => parseInt(el.getAttribute('data-indent') || '0', 10),
        }
      }
    }];
  },
  addCommands() {
    return {
      indent: () => ({ tr, state, dispatch }) => {
        const { selection } = state;
        const { from, to } = selection;
        let changed = false;
        state.doc.nodesBetween(from, to, (node, pos) => {
          if (['paragraph', 'heading', 'listItem', 'taskItem'].includes(node.type.name)) {
            const cur = node.attrs.indent || 0;
            if (cur < 6) {
              tr.setNodeMarkup(pos, null, { ...node.attrs, indent: cur + 1 });
              changed = true;
            }
          }
        });
        if (changed && dispatch) dispatch(tr);
        return changed;
      },
      outdent: () => ({ tr, state, dispatch }) => {
        const { selection } = state;
        const { from, to } = selection;
        let changed = false;
        state.doc.nodesBetween(from, to, (node, pos) => {
          if (['paragraph', 'heading', 'listItem', 'taskItem'].includes(node.type.name)) {
            const cur = node.attrs.indent || 0;
            if (cur > 0) {
              tr.setNodeMarkup(pos, null, { ...node.attrs, indent: cur - 1 });
              changed = true;
            }
          }
        });
        if (changed && dispatch) dispatch(tr);
        return changed;
      }
    };
  },
});

// ── Editor init ──
const editor = new Editor({
  element: document.getElementById('editor'),
  extensions: [
    Document,
    Paragraph,
    Text,
    Bold,
    Italic,
    Underline,
    Strike,
    Code,
    CodeBlock,
    Heading.configure({ levels: [1, 2, 3] }),
    BulletList,
    OrderedList,
    ListItem,
    TaskList,
    TaskItem.configure({ nested: false }),
    TextAlign.configure({ types: ['heading', 'paragraph'] }),
    Indent,
    History,
    HorizontalRule,
    Blockquote,
    Link.configure({ openOnClick: false, autolink: true }),
    Placeholder.configure({ placeholder: 'Start typing…' }),
  ],
  content: '',
  onUpdate({ editor }) {
    syncToolbar();
    postToRN('update', { html: editor.getHTML(), text: editor.getText() });
  },
  onSelectionUpdate() {
    syncToolbar();
  },
});

// ── RN bridge ──
function postToRN(type, payload = {}) {
  const msg = JSON.stringify({ type, ...payload });
  if (window.ReactNativeWebView) {
    window.ReactNativeWebView.postMessage(msg);
  }
}

// Expose API for RN → WebView
window.editorSetContent = (html) => editor.commands.setContent(html);
window.editorGetHTML = () => editor.getHTML();
window.editorGetText = () => editor.getText();
window.editorFocus = () => editor.commands.focus();

// ── Style label map ──
const styleLabels = {
  title: 'Title', heading: 'Heading',
  subheading: 'Subheading', body: 'Body', mono: 'Mono'
};

function getCurrentStyle() {
  if (editor.isActive('heading', { level: 1 })) return 'title';
  if (editor.isActive('heading', { level: 2 })) return 'heading';
  if (editor.isActive('heading', { level: 3 })) return 'subheading';
  return 'body'; // mono not detectable via isActive; default body
}

function syncToolbar() {
  const style = getCurrentStyle();
  document.getElementById('style-label').textContent = styleLabels[style];

  const map = {
    'btn-bold': () => editor.isActive('bold'),
    'btn-italic': () => editor.isActive('italic'),
    'btn-underline': () => editor.isActive('underline'),
    'btn-strike': () => editor.isActive('strike'),
    'btn-code': () => editor.isActive('code'),
    'btn-bullet': () => editor.isActive('bulletList'),
    'btn-ordered': () => editor.isActive('orderedList'),
    'btn-tasklist': () => editor.isActive('taskList'),
    'btn-blockquote': () => editor.isActive('blockquote'),
    'btn-codeblock': () => editor.isActive('codeBlock'),
    'btn-align-left': () => editor.isActive({ textAlign: 'left' }),
    'btn-align-center': () => editor.isActive({ textAlign: 'center' }),
    'btn-align-right': () => editor.isActive({ textAlign: 'right' }),
    'btn-align-justify': () => editor.isActive({ textAlign: 'justify' }),
  };

  for (const [id, check] of Object.entries(map)) {
    document.getElementById(id)?.classList.toggle('is-active', check());
  }
}

// ── Button wiring ──
function wire(id, fn) {
  document.getElementById(id)?.addEventListener('click', (e) => {
    e.preventDefault();
    fn();
    editor.commands.focus();
  });
}

wire('btn-undo', () => editor.commands.undo());
wire('btn-redo', () => editor.commands.redo());
wire('btn-bold', () => editor.chain().focus().toggleBold().run());
wire('btn-italic', () => editor.chain().focus().toggleItalic().run());
wire('btn-underline', () => editor.chain().focus().toggleUnderline().run());
wire('btn-strike', () => editor.chain().focus().toggleStrike().run());
wire('btn-code', () => editor.chain().focus().toggleCode().run());
wire('btn-bullet', () => editor.chain().focus().toggleBulletList().run());
wire('btn-ordered', () => editor.chain().focus().toggleOrderedList().run());
wire('btn-tasklist', () => editor.chain().focus().toggleTaskList().run());
wire('btn-indent', () => editor.chain().focus().indent().run());
wire('btn-outdent', () => editor.chain().focus().outdent().run());
wire('btn-align-left', () => editor.chain().focus().setTextAlign('left').run());
wire('btn-align-center', () => editor.chain().focus().setTextAlign('center').run());
wire('btn-align-right', () => editor.chain().focus().setTextAlign('right').run());
wire('btn-align-justify', () => editor.chain().focus().setTextAlign('justify').run());
wire('btn-blockquote', () => editor.chain().focus().toggleBlockquote().run());
wire('btn-codeblock', () => editor.chain().focus().toggleCodeBlock().run());
wire('btn-hr', () => editor.chain().focus().setHorizontalRule().run());

// Style button opens popover
document.getElementById('btn-style').addEventListener('click', () => {
  openStylePopover();
});

// ── Style popover ──
function openStylePopover() {
  const pop = document.getElementById('style-popover');
  pop.classList.add('open');
  const cur = getCurrentStyle();
  document.querySelectorAll('.style-option').forEach(opt => {
    const active = opt.dataset.style === cur;
    opt.classList.toggle('active', active);
  });
}
function closeStylePopover() {
  document.getElementById('style-popover').classList.remove('open');
}

document.getElementById('style-popover-backdrop').addEventListener('click', closeStylePopover);

document.querySelectorAll('.style-option').forEach(opt => {
  opt.addEventListener('click', () => {
    const style = opt.dataset.style;
    switch (style) {
      case 'title':      editor.chain().focus().setHeading({ level: 1 }).run(); break;
      case 'heading':    editor.chain().focus().setHeading({ level: 2 }).run(); break;
      case 'subheading': editor.chain().focus().setHeading({ level: 3 }).run(); break;
      case 'body':       editor.chain().focus().setParagraph().run(); break;
      case 'mono':
        editor.chain().focus().setParagraph().run();
        // Toggle mono class on selection nodes
        break;
    }
    closeStylePopover();
    syncToolbar();
  });
});

// Initial sync
syncToolbar();
</script>
</body>
</html>
